<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinyClaw 管理界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            font-size: 28px;
            color: #00d9ff;
        }
        .version {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }
        .header-actions {
            display: flex;
            gap: 10px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        .card h2 {
            font-size: 18px;
            color: #00d9ff;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .stat {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .stat-label {
            color: #888;
        }
        .stat-value {
            color: #00ff88;
            font-weight: bold;
        }
        .status-ok {
            color: #00ff88;
        }
        .status-error {
            color: #ff4757;
        }
        .btn {
            background: #00d9ff;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #00b8d4;
            transform: translateY(-2px);
        }
        .btn-danger {
            background: #ff4757;
            color: white;
        }
        .btn-danger:hover {
            background: #ff6b81;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #eee;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        th {
            color: #888;
            font-weight: normal;
            font-size: 12px;
            text-transform: uppercase;
        }
        .session-kind {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            background: rgba(0,217,255,0.2);
            color: #00d9ff;
        }
        .refresh-info {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 20px;
        }
        
        /* Chart styles */
        .chart-container {
            position: relative;
            height: 150px;
            margin-top: 15px;
        }
        .chart-canvas {
            width: 100%;
            height: 100%;
        }
        .chart-legend {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-size: 12px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        /* Session details */
        .session-row {
            cursor: pointer;
            transition: background 0.2s;
        }
        .session-row:hover {
            background: rgba(0,217,255,0.1);
        }
        .session-details {
            display: none;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
        }
        .session-details.active {
            display: block;
        }
        
        /* Messages panel */
        .messages-panel {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        .message-item {
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }
        .message-role {
            font-weight: bold;
            color: #00d9ff;
            margin-right: 10px;
        }
        .message-content {
            color: #ccc;
            margin-top: 5px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        /* Search box */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .search-input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            background: rgba(0,0,0,0.3);
            color: #eee;
            font-size: 14px;
        }
        .search-input:focus {
            outline: none;
            border-color: #00d9ff;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }
        .tab {
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            color: #888;
            transition: all 0.2s;
        }
        .tab:hover {
            background: rgba(255,255,255,0.1);
        }
        .tab.active {
            background: #00d9ff;
            color: #1a1a2e;
        }
        
        /* Memory meter */
        .memory-meter {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-top: 5px;
            overflow: hidden;
        }
        .memory-bar {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00d9ff);
            transition: width 0.5s;
        }
        
        /* Full width card */
        .full-width {
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🔧 TinyClaw 管理界面</h1>
                <div class="version">版本: <span id="version">加载中...</span></div>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="toggleAutoRefresh()">
                    <span id="autoRefreshText">⏸️ 暂停自动刷新</span>
                </button>
                <button class="btn" onclick="refreshData()">🔄 刷新</button>
            </div>
        </header>
        
        <div class="grid">
            <div class="card">
                <h2>📊 系统状态</h2>
                <div class="stat">
                    <span class="stat-label">状态</span>
                    <span class="stat-value status-ok" id="status">运行中</span>
                </div>
                <div class="stat">
                    <span class="stat-label">运行时间</span>
                    <span class="stat-value" id="uptime">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">会话数</span>
                    <span class="stat-value" id="sessions">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">当前模型</span>
                    <span class="stat-value" id="model">-</span>
                </div>
            </div>
            
            <div class="card">
                <h2>💾 内存使用</h2>
                <div class="stat">
                    <span class="stat-label">RSS 内存</span>
                    <span class="stat-value" id="memoryRss">-</span>
                </div>
                <div class="memory-meter">
                    <div class="memory-bar" id="memoryBar" style="width: 0%"></div>
                </div>
                <div class="chart-container">
                    <canvas id="memoryChart" class="chart-canvas"></canvas>
                </div>
            </div>
            
            <div class="card">
                <h2>⚙️ 网关配置</h2>
                <div class="stat">
                    <span class="stat-label">绑定地址</span>
                    <span class="stat-value" id="bindAddress">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">调试模式</span>
                    <span class="stat-value" id="verbose">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Exec 工具</span>
                    <span class="stat-value" id="execEnabled">-</span>
                </div>
            </div>
        </div>
        
        <div class="card full-width" style="margin-top: 20px;">
            <h2>📋 会话管理</h2>
            <div class="search-box">
                <input type="text" class="search-input" id="sessionSearch" placeholder="搜索会话..." oninput="filterSessions()">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>标签</th>
                        <th>类型</th>
                        <th>创建时间</th>
                        <th>最后活跃</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="sessionList">
                    <tr><td colspan="6">加载中...</td></tr>
                </tbody>
            </table>
            <div id="sessionDetails" class="session-details">
                <h3 style="color: #00d9ff; margin-bottom: 10px;">会话消息</h3>
                <div class="messages-panel" id="messagesPanel">
                    选择一个会话查看消息
                </div>
            </div>
        </div>
        
        <div class="card full-width" style="margin-top: 20px;">
            <h2>📈 性能监控</h2>
            <div class="tabs">
                <div class="tab active" onclick="switchChart('memory')">内存</div>
                <div class="tab" onclick="switchChart('sessions')">会话数</div>
                <div class="tab" onclick="switchChart('uptime')">运行时间</div>
            </div>
            <div class="chart-container" style="height: 200px;">
                <canvas id="mainChart" class="chart-canvas"></canvas>
            </div>
            <div class="chart-legend">
                <div class="legend-item">
                    <div class="legend-dot" style="background: #00d9ff;"></div>
                    <span id="chartLabel">内存使用 (MB)</span>
                </div>
            </div>
        </div>
        
        <div class="refresh-info">
            自动刷新: <span id="autoRefreshStatus">启用</span> | 间隔: 5秒 | <span id="lastUpdate">最后更新: -</span>
        </div>
    </div>
    
    <script>
        const API_BASE = '';
        let autoRefresh = true;
        let refreshInterval = null;
        let currentChartType = 'memory';
        
        // Data history for charts
        const historyLength = 60;
        const dataHistory = {
            memory: [],
            sessions: [],
            uptime: []
        };
        
        async function fetchJSON(url) {
            const response = await fetch(url);
            return response.json();
        }
        
        async function refreshData() {
            try {
                // Fetch status
                const status = await fetchJSON(API_BASE + '/api/status');
                document.getElementById('version').textContent = status.version;
                document.getElementById('uptime').textContent = formatUptime(status.uptime_seconds);
                document.getElementById('sessions').textContent = status.sessions;
                document.getElementById('model').textContent = status.model;
                document.getElementById('bindAddress').textContent = status.gateway.bind_address;
                document.getElementById('verbose').textContent = status.gateway.verbose ? '启用' : '禁用';
                document.getElementById('execEnabled').textContent = status.tools.exec_enabled ? '启用' : '禁用';
                
                // Update history
                dataHistory.sessions.push(status.sessions);
                dataHistory.uptime.push(status.uptime_seconds);
                if (dataHistory.sessions.length > historyLength) {
                    dataHistory.sessions.shift();
                    dataHistory.uptime.shift();
                }
                
                // Fetch health for memory
                const health = await fetchJSON(API_BASE + '/health');
                if (health.memory_usage) {
                    const rssMB = Math.round(health.memory_usage.resident_set_kb / 1024);
                    document.getElementById('memoryRss').textContent = rssMB + ' MB';
                    document.getElementById('memoryBar').style.width = Math.min(rssMB / 100 * 100, 100) + '%';
                    
                    dataHistory.memory.push(health.memory_usage.resident_set_kb / 1024);
                    if (dataHistory.memory.length > historyLength) {
                        dataHistory.memory.shift();
                    }
                }
                
                // Fetch sessions
                const sessions = await fetchJSON(API_BASE + '/api/sessions');
                renderSessions(sessions.sessions || []);
                
                document.getElementById('lastUpdate').textContent = '最后更新: ' + new Date().toLocaleTimeString('zh-CN');
                
                // Update charts
                drawMemoryChart();
                drawMainChart();
                
            } catch (error) {
                console.error('Failed to fetch data:', error);
                document.getElementById('status').textContent = '错误';
                document.getElementById('status').className = 'stat-value status-error';
            }
        }
        
        function renderSessions(sessions) {
            const tbody = document.getElementById('sessionList');
            const searchTerm = document.getElementById('sessionSearch').value.toLowerCase();
            
            const filtered = sessions.filter(s => 
                (s.id || '').toLowerCase().includes(searchTerm) ||
                (s.label || '').toLowerCase().includes(searchTerm) ||
                (s.kind || '').toLowerCase().includes(searchTerm)
            );
            
            if (filtered.length > 0) {
                tbody.innerHTML = filtered.map(s => `
                    <tr class="session-row" onclick="showSessionDetails('${s.id}')">
                        <td><code>${s.id.substring(0, 8)}...</code></td>
                        <td>${s.label || '-'}</td>
                        <td><span class="session-kind">${s.kind}</span></td>
                        <td>${new Date(s.createdAt).toLocaleString('zh-CN')}</td>
                        <td>${new Date(s.lastActive).toLocaleString('zh-CN')}</td>
                        <td><button class="btn btn-secondary" style="padding: 5px 10px; font-size: 12px;" onclick="event.stopPropagation(); showSessionDetails('${s.id}')">查看</button></td>
                    </tr>
                `).join('');
            } else {
                tbody.innerHTML = '<tr><td colspan="6">暂无会话</td></tr>';
            }
        }
        
        function filterSessions() {
            refreshData();
        }
        
        async function showSessionDetails(sessionId) {
            const details = document.getElementById('sessionDetails');
            details.classList.toggle('active');
            
            if (details.classList.contains('active')) {
                const messagesPanel = document.getElementById('messagesPanel');
                messagesPanel.innerHTML = '<div style="color: #888;">加载消息中...</div>';
                
                // Try to fetch messages (if API supports it)
                try {
                    const response = await fetch(API_BASE + '/api/sessions/' + sessionId + '/messages');
                    if (response.ok) {
                        const data = await response.json();
                        if (data.messages && data.messages.length > 0) {
                            messagesPanel.innerHTML = data.messages.map(m => `
                                <div class="message-item">
                                    <span class="message-role">${m.role || 'unknown'}:</span>
                                    <div class="message-content">${escapeHtml(m.content || '(empty)')}</div>
                                </div>
                            `).join('');
                        } else {
                            messagesPanel.innerHTML = '<div style="color: #888;">暂无消息</div>';
                        }
                    } else {
                        messagesPanel.innerHTML = '<div style="color: #888;">会话消息预览功能需要 API 支持</div>';
                    }
                } catch (e) {
                    messagesPanel.innerHTML = '<div style="color: #888;">会话 ID: ' + sessionId + '</div>';
                }
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatUptime(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            if (hours > 0) {
                return `${hours}小时 ${minutes}分钟 ${secs}秒`;
            } else if (minutes > 0) {
                return `${minutes}分钟 ${secs}秒`;
            }
            return `${secs}秒`;
        }
        
        function toggleAutoRefresh() {
            autoRefresh = !autoRefresh;
            document.getElementById('autoRefreshText').textContent = autoRefresh ? '⏸️ 暂停自动刷新' : '▶️ 启用自动刷新';
            document.getElementById('autoRefreshStatus').textContent = autoRefresh ? '启用' : '暂停';
            
            if (autoRefresh) {
                startAutoRefresh();
            } else {
                clearInterval(refreshInterval);
            }
        }
        
        function startAutoRefresh() {
            clearInterval(refreshInterval);
            refreshInterval = setInterval(refreshData, 5000);
        }
        
        // Chart drawing
        function drawMemoryChart() {
            const canvas = document.getElementById('memoryChart');
            if (!canvas || !dataHistory.memory.length) return;
            
            const ctx = canvas.getContext('2d');
            const width = canvas.offsetWidth;
            const height = canvas.offsetHeight;
            canvas.width = width * 2;
            canvas.height = height * 2;
            ctx.scale(2, 2);
            
            ctx.clearRect(0, 0, width, height);
            
            const data = dataHistory.memory;
            const max = Math.max(...data, 100);
            const stepX = width / (data.length - 1 || 1);
            
            // Draw line
            ctx.beginPath();
            ctx.strokeStyle = '#00d9ff';
            ctx.lineWidth = 2;
            
            data.forEach((val, i) => {
                const x = i * stepX;
                const y = height - (val / max) * (height - 20);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
            
            // Draw fill
            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.fillStyle = 'rgba(0, 217, 255, 0.1)';
            ctx.fill();
        }
        
        function drawMainChart() {
            const canvas = document.getElementById('mainChart');
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            const width = canvas.offsetWidth;
            const height = canvas.offsetHeight;
            canvas.width = width * 2;
            canvas.height = height * 2;
            ctx.scale(2, 2);
            
            ctx.clearRect(0, 0, width, height);
            
            const data = dataHistory[currentChartType];
            if (!data || !data.length) return;
            
            const max = Math.max(...data, 1);
            const stepX = width / (data.length - 1 || 1);
            
            // Draw grid
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 5; i++) {
                const y = (height / 5) * i;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
            
            // Draw line
            ctx.beginPath();
            ctx.strokeStyle = '#00d9ff';
            ctx.lineWidth = 2;
            
            data.forEach((val, i) => {
                const x = i * stepX;
                const y = height - 20 - (val / max) * (height - 40);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
            
            // Draw points
            data.forEach((val, i) => {
                const x = i * stepX;
                const y = height - 20 - (val / max) * (height - 40);
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#00d9ff';
                ctx.fill();
            });
        }
        
        function switchChart(type) {
            currentChartType = type;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            const labels = {
                memory: '内存使用 (MB)',
                sessions: '活跃会话数',
                uptime: '运行时间 (秒)'
            };
            document.getElementById('chartLabel').textContent = labels[type];
            drawMainChart();
        }
        
        // Initial load
        refreshData();
        startAutoRefresh();
        
        // Handle window resize
        window.addEventListener('resize', () => {
            drawMemoryChart();
            drawMainChart();
        });
    </script>
</body>
</html>
